services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bancodigital
      POSTGRES_USER: bancodigital
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bancodigital_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bancodigital -d bancodigital"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__Default: "Host=db;Port=5432;Database=bancodigital;Username=bancodigital;Password=${POSTGRES_PASSWORD:-bancodigital_dev}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
